services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: russian_wordscodex
      POSTGRES_USER: wordscodex
      POSTGRES_PASSWORD: wordscodex
    ports:
      - '54322:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wordscodex -d russian_wordscodex']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    ports:
      - '63799:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  redis-data:
