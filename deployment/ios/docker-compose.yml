name: russian-wordscodex-ios

services:
  api:
    build:
      context: ../..
      dockerfile: deployment/ios/api.Dockerfile
    environment:
      HOST: 0.0.0.0
      PORT: 4000
    expose:
      - '4000'
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://127.0.0.1:4000/api/v1/health'').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  web:
    build:
      context: ../..
      dockerfile: deployment/ios/web.Dockerfile
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '${WEB_PORT:-18081}:80'
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1/ >/dev/null || exit 1']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
